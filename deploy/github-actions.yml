# GitHub Actions 定时推送配置
# 保存到 .github/workflows/daily-news.yml

name: Daily News Push

on:
  schedule:
    # 每天9:00和18:00 UTC运行（北京时间需要+8小时）
    # 9:00 UTC = 17:00 北京时间
    # 1:00 UTC = 9:00 北京时间
    - cron: '0 1 * * *'  # 北京时间9:00
    - cron: '0 10 * * *' # 北京时间18:00
  workflow_dispatch:  # 支持手动触发

jobs:
  push-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        
    - name: Run news push
      env:
        WECHAT_ROBOT_WEBHOOK_KEY: ${{ secrets.WECHAT_ROBOT_WEBHOOK_KEY }}
      run: |
        uv run python src/main.py -m flow -i '{"search_query":"今日热点","time_range":"1d"}'
